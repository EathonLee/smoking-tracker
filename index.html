<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨身抽菸紀錄器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #1d1d1f;
            font-size: 22px;
            margin-bottom: 5px;
        }
        .date-str {
            text-align: center;
            color: #86868b;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .counter-box {
            text-align: center;
            margin-bottom: 30px;
        }
        .label {
            font-size: 14px;
            color: #86868b;
            text-transform: uppercase;
        }
        .count {
            font-size: 64px;
            font-weight: 700;
            color: #ff453a;
            margin: 10px 0;
        }
        .btn-smoke {
            display: block;
            width: 100%;
            background: #1d1d1f;
            color: white;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-smoke:active {
            background: #555;
            transform: scale(0.98);
        }
        .history {
            margin-top: 30px;
        }
        .history-title {
            font-size: 16px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 12px;
            border-bottom: 1px solid #e5e5ea;
            padding-bottom: 8px;
        }
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f7;
            font-size: 15px;
            color: #3a3a3c;
        }
        .btn-clear {
            background: none;
            border: none;
            color: #ff453a;
            cursor: pointer;
            font-size: 13px;
            margin-top: 25px;
            width: 100%;
            text-align: center;
            opacity: 0.6;
        }
        .btn-clear:hover { opacity: 1; }
        .btn-smoke:disabled {
            background: #c7c7cc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-smoke:disabled:active {
            background: #c7c7cc;
            transform: none;
        }
        .cooldown-bar-wrap {
            margin-top: 12px;
            background: #e5e5ea;
            border-radius: 8px;
            height: 6px;
            overflow: hidden;
            display: none;
        }
        .cooldown-bar {
            height: 100%;
            background: #ff9f0a;
            border-radius: 8px;
            transition: width 1s linear;
        }
        .cooldown-hint {
            text-align: center;
            font-size: 13px;
            color: #ff9f0a;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚬 抽菸紀錄器</h1>
    <div class="date-str" id="currentDate"></div>

    <div class="counter-box">
        <div class="label">今日已抽</div>
        <div class="count" id="smokeCount">0 <span style="font-size: 24px;">根</span></div>
        <button class="btn-smoke" id="btnSmoke" onclick="addSmoke()">現在抽一根</button>
        <div class="cooldown-bar-wrap" id="cooldownBarWrap">
            <div class="cooldown-bar" id="cooldownBar"></div>
        </div>
        <div class="cooldown-hint" id="cooldownHint"></div>
    </div>

    <div class="history">
        <div class="history-title">今日時間紀錄</div>
        <ul class="history-list" id="historyList">
            <!-- 紀錄會顯示在這裡 -->
        </ul>
    </div>

    <button class="btn-clear" onclick="clearData()">清除所有歷史資料</button>
</div>

<script>
    // 取得今天的日期字串 (YYYY-MM-DD)
    function getTodayString() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    // 初始化介面
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('zh-TW', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    // 從 LocalStorage 載入資料
    let smokeData = JSON.parse(localStorage.getItem('smoke_tracker_data')) || {};

    function updateDisplay() {
        const today = getTodayString();
        const todayRecords = smokeData[today] || [];
        
        // 更新數字
        document.getElementById('smokeCount').innerHTML = `${todayRecords.length} <span style="font-size: 24px;">根</span>`;
        
        // 更新列表
        const listEl = document.getElementById('historyList');
        listEl.innerHTML = '';
        
        // 倒序顯示，最新抽的在最上面
        [...todayRecords].reverse().forEach((record, index) => {
            const { display } = parseRecord(record);
            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerHTML = `<span>第 ${todayRecords.length - index} 根</span> <span>${display}</span>`;
            listEl.appendChild(li);
        });
    }

    const COOLDOWN_MS = 60 * 60 * 1000; // 1 小時

    function parseRecord(record) {
        // 格式: "HH:MM:SS|ISO" (新) 或 "HH:MM:SS" (舊)
        if (record.includes('|')) {
            const [display, iso] = record.split('|');
            return { display, ts: new Date(iso).getTime() };
        }
        const [h, m, s] = record.split(':').map(Number);
        const d = new Date();
        d.setHours(h, m, s, 0);
        return { display: record, ts: d.getTime() };
    }

    function getLastSmokeTimestamp() {
        const today = getTodayString();
        const records = smokeData[today] || [];
        if (records.length === 0) return null;
        return parseRecord(records[records.length - 1]).ts;
    }

    function getRemainingMs() {
        const last = getLastSmokeTimestamp();
        if (last === null) return 0;
        return Math.max(0, COOLDOWN_MS - (Date.now() - last));
    }

    function formatCountdown(ms) {
        const totalSec = Math.ceil(ms / 1000);
        const m = Math.floor(totalSec / 60);
        const s = totalSec % 60;
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function updateCooldownUI() {
        const remaining = getRemainingMs();
        const btn = document.getElementById('btnSmoke');
        const barWrap = document.getElementById('cooldownBarWrap');
        const bar = document.getElementById('cooldownBar');
        const hint = document.getElementById('cooldownHint');

        if (remaining > 0) {
            btn.disabled = true;
            btn.textContent = `⏳ 請等候 ${formatCountdown(remaining)}`;
            barWrap.style.display = 'block';
            hint.style.display = 'block';
            hint.textContent = '一小時只能抽一根，請耐心等候 🙏';
            const pct = ((COOLDOWN_MS - remaining) / COOLDOWN_MS * 100).toFixed(1);
            bar.style.width = pct + '%';
        } else {
            btn.disabled = false;
            btn.textContent = '現在抽一根';
            barWrap.style.display = 'none';
            hint.style.display = 'none';
        }
    }

    // 按下「抽一根」
    function addSmoke() {
        if (getRemainingMs() > 0) return;

        const today = getTodayString();
        const now = new Date();
        // 儲存完整 ISO 時間以便計算一小時冷卻
        const isoString = now.toISOString();
        const displayTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;

        if (!smokeData[today]) smokeData[today] = [];
        // 以 "HH:MM:SS|ISO" 格式儲存，向下相容舊顯示邏輯
        smokeData[today].push(`${displayTime}|${isoString}`);
        localStorage.setItem('smoke_tracker_data', JSON.stringify(smokeData));
        updateDisplay();
        updateCooldownUI();
    }

    // 清除資料
    function clearData() {
        if (confirm('確定要清除所有紀錄嗎？此操作無法復原。')) {
            smokeData = {};
            localStorage.removeItem('smoke_tracker_data');
            updateDisplay();
            updateCooldownUI();
        }
    }

    // 首次載入畫面
    updateDisplay();
    updateCooldownUI();
    setInterval(updateCooldownUI, 1000);
</script>

</body>
</html>
